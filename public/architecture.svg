<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" style="background:#0d1117">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }
    .title { font-size: 13px; fill: #8b949e; font-weight: 600; letter-spacing: 2px; }
    .box-label { font-size: 12px; fill: #e6edf3; font-weight: 600; }
    .box-sub { font-size: 10px; fill: #8b949e; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }
    .arrow-label { font-size: 9px; font-weight: 500; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="ah-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a371f7"/>
    </marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="title">HYPESHELF — HIGH LEVEL ARCHITECTURE</text>

  <!-- ═════════ BROWSER / CLIENT ═════════ -->
  <rect x="40" y="60" width="360" height="660" rx="16" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="60" y="88" class="section-label" fill="#58a6ff">BROWSER / CLIENT</text>
  <text x="330" y="88" class="box-sub">Next.js 16</text>

  <!-- Clerk Middleware -->
  <rect x="65" y="108" width="310" height="50" rx="10" fill="#1c1e2a" stroke="#a371f7" stroke-width="1"/>
  <text x="85" y="132" class="box-label" fill="#d2a8ff">Clerk Middleware</text>
  <text x="85" y="148" class="box-sub">Route protection · JWT injection on every request</text>

  <!-- App Router -->
  <rect x="65" y="174" width="310" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="198" class="box-label">App Router</text>
  <text x="85" y="215" class="box-sub">/  → Landing page (public, SSR)</text>
  <text x="85" y="231" class="box-sub">/shelf → Dashboard (protected, client)</text>

  <!-- React Components -->
  <rect x="65" y="260" width="310" height="86" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="284" class="box-label">React Components</text>
  <text x="85" y="301" class="box-sub">RecGrid · RecCard · FilterBar · Hero</text>
  <text x="85" y="317" class="box-sub">AddRecModal → MovieSearch + StarRating</text>
  <text x="85" y="333" class="box-sub">ProfileDropdown · RecAuthorBadge</text>

  <!-- Convex React Hooks -->
  <rect x="65" y="362" width="310" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="386" class="box-label">Convex React Hooks</text>
  <text x="85" y="402" class="box-sub">useQuery · useMutation · usePaginatedQuery</text>

  <!-- Zod -->
  <rect x="65" y="430" width="148" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="454" class="box-label">Zod Validation</text>
  <text x="85" y="468" class="box-sub">Client-side schemas</text>

  <!-- Server Action -->
  <rect x="227" y="430" width="148" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="247" y="454" class="box-label" fill="#d29922">Server Action</text>
  <text x="247" y="468" class="box-sub">TMDB search</text>

  <!-- UI Layer -->
  <rect x="65" y="492" width="310" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="516" class="box-label">UI Layer</text>
  <text x="85" y="530" class="box-sub">shadcn/ui · motion/react · Tailwind CSS v4</text>

  <!-- Genre Filter -->
  <rect x="65" y="554" width="310" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="578" class="box-label">Genre Filter</text>
  <text x="85" y="592" class="box-sub">7 genres + Staff Picks + My Recs tabs</text>

  <!-- Rating -->
  <rect x="65" y="616" width="310" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="640" class="box-label">Half-Star Rating</text>
  <text x="85" y="654" class="box-sub">0.5–5.0 precision · click-zone detection</text>

  <!-- IntersectionObserver -->
  <rect x="65" y="678" width="310" height="30" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="698" class="box-sub">Infinite scroll via IntersectionObserver</text>

  <!-- ═════════ CONVEX BACKEND ═════════ -->
  <rect x="460" y="60" width="320" height="660" rx="16" fill="#161b22" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="480" y="88" class="section-label" fill="#3fb950">CONVEX BACKEND</text>
  <text x="710" y="88" class="box-sub">Real-time Cloud</text>

  <!-- Query Engine -->
  <rect x="485" y="108" width="270" height="66" rx="10" fill="#0d1f0d" stroke="#238636" stroke-width="1"/>
  <text x="505" y="132" class="box-label" fill="#7ee787">Query Engine</text>
  <text x="505" y="149" class="box-sub">Reactive subscriptions via WebSocket</text>
  <text x="505" y="165" class="box-sub">Push updates to all connected clients</text>

  <!-- Mutation Engine -->
  <rect x="485" y="190" width="270" height="66" rx="10" fill="#0d1f0d" stroke="#238636" stroke-width="1"/>
  <text x="505" y="214" class="box-label" fill="#7ee787">Mutation Engine</text>
  <text x="505" y="231" class="box-sub">ACID transactions on every write</text>
  <text x="505" y="247" class="box-sub">create · remove · toggleStaffPick · store</text>

  <!-- Auth Verification -->
  <rect x="485" y="272" width="270" height="52" rx="10" fill="#1c1e2a" stroke="#a371f7" stroke-width="1"/>
  <text x="505" y="296" class="box-label" fill="#d2a8ff">Auth Verification</text>
  <text x="505" y="313" class="box-sub">ctx.auth.getUserIdentity() — Clerk JWT</text>

  <!-- Server Validation -->
  <rect x="485" y="340" width="270" height="66" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="505" y="364" class="box-label">Server Validation</text>
  <text x="505" y="381" class="box-sub">Genre allowlist · URL sanitization (isSafeUrl)</text>
  <text x="505" y="397" class="box-sub">Length limits · hypeScore range [1–10]</text>

  <!-- recommendations table -->
  <rect x="485" y="422" width="270" height="96" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="505" y="446" class="box-label" fill="#e3b341">DB: recommendations</text>
  <text x="505" y="463" class="box-sub">title · genre · blurb · hypeScore ·  posterUrl</text>
  <text x="505" y="479" class="box-sub">userId · userName · userAvatar · isStaffPick</text>
  <text x="505" y="495" class="box-sub" fill="#636e7b">link</text>
  <text x="505" y="510" class="box-sub" fill="#58a6ff">idx: by_genre · by_userId · by_staffPick</text>

  <!-- users table -->
  <rect x="485" y="534" width="270" height="72" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="505" y="558" class="box-label" fill="#e3b341">DB: users</text>
  <text x="505" y="575" class="box-sub">clerkId · role (user | admin) · name · email</text>
  <text x="505" y="591" class="box-sub" fill="#58a6ff">idx: by_clerkId</text>

  <!-- Cursor Pagination -->
  <rect x="485" y="622" width="270" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="505" y="646" class="box-label">Cursor Pagination</text>
  <text x="505" y="662" class="box-sub">Built-in paginator with cursor tokens</text>

  <!-- RBAC Logic -->
  <rect x="485" y="684" width="270" height="30" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="505" y="704" class="box-sub">RBAC: owner check + admin role check</text>

  <!-- ═════════ EXTERNAL SERVICES ═════════ -->
  <rect x="840" y="60" width="320" height="450" rx="16" fill="#161b22" stroke="#d29922" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="860" y="88" class="section-label" fill="#d29922">EXTERNAL SERVICES</text>

  <!-- Clerk -->
  <rect x="865" y="108" width="270" height="110" rx="10" fill="#1c1e2a" stroke="#a371f7" stroke-width="1"/>
  <text x="885" y="132" class="box-label" fill="#d2a8ff">Clerk</text>
  <text x="885" y="150" class="box-sub">OAuth: Google, X (Twitter)</text>
  <text x="885" y="166" class="box-sub">Email / password authentication</text>
  <text x="885" y="182" class="box-sub">JWT token issuance + session management</text>
  <text x="885" y="198" class="box-sub">JWKS endpoint for Convex verification</text>
  <text x="885" y="212" class="box-sub" fill="#636e7b">Custom sign-in / sign-up UI</text>

  <!-- TMDB API -->
  <rect x="865" y="234" width="270" height="88" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="258" class="box-label" fill="#e3b341">TMDB API</text>
  <text x="885" y="276" class="box-sub">Movie search (title, poster, genres)</text>
  <text x="885" y="292" class="box-sub">Genre ID → name mapping (19+ genres)</text>
  <text x="885" y="308" class="box-sub">Called via Next.js Server Action ('use server')</text>

  <!-- DiceBear -->
  <rect x="865" y="338" width="270" height="66" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="362" class="box-label">DiceBear</text>
  <text x="885" y="380" class="box-sub">Notionists-style avatar generation</text>
  <text x="885" y="396" class="box-sub">Fallback when no Clerk profile image</text>

  <!-- Vercel -->
  <rect x="865" y="420" width="270" height="46" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="444" class="box-label">Vercel</text>
  <text x="885" y="458" class="box-sub">Frontend hosting + edge middleware</text>

  <!-- ═════════ CONNECTION ARROWS ═════════ -->

  <!-- Client → Convex: WebSocket (real-time) -->
  <line x1="375" y1="388" x2="485" y2="143" stroke="#3fb950" stroke-width="2" marker-end="url(#ah-green)"/>
  <rect x="386" y="237" width="82" height="18" rx="4" fill="#0d1117"/>
  <text x="392" y="250" class="arrow-label" fill="#3fb950">WebSocket</text>

  <!-- Convex → Client: Real-time push -->
  <line x1="485" y1="160" x2="375" y2="300" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ah-green)"/>
  <rect x="386" y="210" width="90" height="18" rx="4" fill="#0d1117"/>
  <text x="392" y="223" class="arrow-label" fill="#3fb950">push updates</text>

  <!-- Client → Convex: Mutations -->
  <line x1="375" y1="320" x2="485" y2="223" stroke="#8b949e" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="386" y="264" width="70" height="18" rx="4" fill="#0d1117"/>
  <text x="392" y="277" class="arrow-label" fill="#8b949e">mutations</text>

  <!-- Convex → Clerk: JWT verify -->
  <line x1="755" y1="298" x2="865" y2="170" stroke="#a371f7" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <rect x="775" y="222" width="72" height="18" rx="4" fill="#0d1117"/>
  <text x="781" y="235" class="arrow-label" fill="#a371f7">JWT verify</text>

  <!-- Client middleware → Clerk: session check -->
  <line x1="375" y1="133" x2="865" y2="133" stroke="#a371f7" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#ah-purple)"/>
  <rect x="570" y="119" width="96" height="18" rx="4" fill="#0d1117"/>
  <text x="576" y="132" class="arrow-label" fill="#a371f7">session check</text>

  <!-- Server Action → TMDB API -->
  <line x1="375" y1="453" x2="865" y2="278" stroke="#d29922" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#ah-amber)"/>
  <rect x="558" y="358" width="128" height="18" rx="4" fill="#0d1117"/>
  <text x="564" y="371" class="arrow-label" fill="#d29922">Server Action → TMDB</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="840" y="540" width="320" height="180" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="860" y="568" class="section-label" fill="#8b949e">LEGEND</text>

  <line x1="860" y1="590" x2="900" y2="590" stroke="#3fb950" stroke-width="2"/>
  <text x="910" y="594" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">WebSocket (real-time sync)</text>

  <line x1="860" y1="612" x2="900" y2="612" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="910" y="616" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">Real-time push updates</text>

  <line x1="860" y1="634" x2="900" y2="634" stroke="#a371f7" stroke-width="1.5"/>
  <text x="910" y="638" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">Auth / JWT flow</text>

  <line x1="860" y1="656" x2="900" y2="656" stroke="#d29922" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="910" y="660" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">API request (REST)</text>

  <rect x="860" y="674" width="18" height="14" rx="4" fill="#0d1f0d" stroke="#238636" stroke-width="0.8"/>
  <text x="886" y="685" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">Convex runtime</text>

  <rect x="860" y="696" width="18" height="14" rx="4" fill="#1c1e2a" stroke="#a371f7" stroke-width="0.8"/>
  <text x="886" y="707" font-size="10" fill="#8b949e" font-family="ui-monospace, monospace">Auth layer (Clerk)</text>
</svg>
